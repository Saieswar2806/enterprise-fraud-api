name: Enterprise MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Spin up a live Redis database on the GitHub cloud server
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
          
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        
    - name: Train Models & Generate MLflow Database
      run: python src/train.py
      
    - name: Load Feature Store (Redis)
      run: python src/feature_store.py
      
    - name: Run Automated Tests
      run: python -m pytest tests/
      
    - name: Verify Docker Build (Dry Run)
      run: docker build -t fraud-api-test .